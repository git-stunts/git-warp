<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>git-warp Logo Gallery</title>
    <style>
      :root {
        color-scheme: light dark;
        --light-bg: #ffffff;
        --light-fg: #111111;
        --light-border: rgba(17, 17, 17, 0.12);
        --dark-bg: #000000;
        --dark-fg: #f2f2f2;
        --dark-border: rgba(255, 255, 255, 0.14);
        --card-radius: 18px;
        --shadow: 0 14px 40px rgba(0, 0, 0, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "SF Pro Text", "Segoe UI", Helvetica, Arial, sans-serif;
      }

      .gallery {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        min-height: 100vh;
      }

      .panel {
        padding: 32px 28px 40px;
      }

      .panel--light {
        background: var(--light-bg);
        color: var(--light-fg);
      }

      .panel--dark {
        background: var(--dark-bg);
        color: var(--dark-fg);
      }

      .panel__header {
        position: sticky;
        top: 0;
        z-index: 1;
        margin: 0 0 24px;
        padding: 12px 0 16px;
        backdrop-filter: blur(10px);
      }

      .panel--light .panel__header {
        background: linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0.96),
          rgba(255, 255, 255, 0.86),
          rgba(255, 255, 255, 0)
        );
      }

      .panel--dark .panel__header {
        background: linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0.96),
          rgba(0, 0, 0, 0.86),
          rgba(0, 0, 0, 0)
        );
      }

      .panel__title {
        margin: 0;
        font-size: 1.7rem;
        line-height: 1.1;
      }

      .panel__subtitle {
        margin: 8px 0 0;
        font-size: 0.98rem;
        opacity: 0.72;
      }

      .stack {
        display: grid;
        gap: 24px;
      }

      .card {
        border: 1px solid transparent;
        border-radius: var(--card-radius);
        padding: 18px 18px 22px;
        box-shadow: var(--shadow);
      }

      .panel--light .card {
        background: #fbfbfb;
        border-color: var(--light-border);
      }

      .panel--dark .card {
        background: #0f0f0f;
        border-color: var(--dark-border);
      }

      .card__label {
        display: block;
        margin: 0 0 14px;
        font-size: 0.84rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        opacity: 0.78;
      }

      .card__frame {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 170px;
        padding: 14px;
        border-radius: 14px;
      }

      .panel--light .card__frame {
        background: #ffffff;
        border: 1px dashed rgba(17, 17, 17, 0.12);
      }

      .panel--dark .card__frame {
        background: #050505;
        border: 1px dashed rgba(255, 255, 255, 0.16);
      }

      .card__frame img {
        display: block;
        width: min(100%, 520px);
        height: auto;
        max-height: 220px;
        object-fit: contain;
      }

      @media (max-width: 900px) {
        .gallery {
          grid-template-columns: 1fr;
        }

        .panel {
          min-height: auto;
        }

        .card__frame {
          min-height: 140px;
        }
      }
    </style>
  </head>
  <body>
    <main class="gallery">
      <section class="panel panel--light" aria-labelledby="light-title">
        <header class="panel__header">
          <h1 class="panel__title" id="light-title">Light Background</h1>
          <p class="panel__subtitle">White backdrop for readability checks.</p>
        </header>
        <div class="stack">
          <article class="card">
            <span class="card__label">git-warp</span>
            <div class="card__frame">
              <img src="./git-warp.svg" alt="git-warp logo on a light background" />
            </div>
          </article>
          <article class="card">
            <span class="card__label">git-warp alt</span>
            <div class="card__frame">
              <img src="./git-warp-alt.svg" alt="git-warp alternate logo on a light background" />
            </div>
          </article>
          <article class="card">
            <span class="card__label">git-stunts</span>
            <div class="card__frame">
              <img src="./git-stunts.svg" alt="git-stunts logo on a light background" />
            </div>
          </article>
          <article class="card">
            <span class="card__label">aion</span>
            <div class="card__frame">
              <img src="./aion.svg" alt="AION logo on a light background" />
            </div>
          </article>
          <article class="card">
            <span class="card__label">aion source</span>
            <div class="card__frame">
              <img src="./aion-logo.svg" alt="AION source logo on a light background" />
            </div>
          </article>
        </div>
      </section>

      <section class="panel panel--dark" aria-labelledby="dark-title">
        <header class="panel__header">
          <h1 class="panel__title" id="dark-title">Dark Background</h1>
          <p class="panel__subtitle">Black backdrop for contrast checks.</p>
        </header>
        <div class="stack">
          <article class="card">
            <span class="card__label">git-warp</span>
            <div class="card__frame">
              <img src="./git-warp.svg" alt="git-warp logo on a dark background" />
            </div>
          </article>
          <article class="card">
            <span class="card__label">git-warp alt</span>
            <div class="card__frame">
              <img src="./git-warp-alt.svg" alt="git-warp alternate logo on a dark background" />
            </div>
          </article>
          <article class="card">
            <span class="card__label">git-stunts</span>
            <div class="card__frame">
              <img src="./git-stunts.svg" alt="git-stunts logo on a dark background" />
            </div>
          </article>
          <article class="card">
            <span class="card__label">aion</span>
            <div class="card__frame">
              <img src="./aion.svg" alt="AION logo on a dark background" />
            </div>
          </article>
          <article class="card">
            <span class="card__label">aion source</span>
            <div class="card__frame">
              <img src="./aion-logo.svg" alt="AION source logo on a dark background" />
            </div>
          </article>
        </div>
      </section>
    </main>
  </body>
</html>
